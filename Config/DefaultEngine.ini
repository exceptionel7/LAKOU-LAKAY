; ------------------------------------------------------------------
; Online Subsystem (coop 2 joueurs)
; ------------------------------------------------------------------
; Option A - EOS (Epic Online Services), gratuit et cross-platform.
;   Renseigne les identifiants depuis le Epic Games Dev Portal (dev.epicgames.com/portal).

[OnlineSubsystem]
DefaultPlatformService=EOS

[OnlineSubsystemEOS]
bEnabled=true

; [/Script/OnlineSubsystemEOS.EOSSettings]
; ProductId=<A_REMPLIR>
; SandboxId=<A_REMPLIR>
; DeploymentId=<A_REMPLIR>
; ClientId=<A_REMPLIR>
; ClientSecret=<A_REMPLIR>

; Option B - Steam (PC uniquement). Décommente et mets bEnabled=true côté EOS à false.
; [OnlineSubsystem]
; DefaultPlatformService=Steam
; [OnlineSubsystemSteam]
; bEnabled=true
; SteamDevAppId=480   ; AppId de test Spacewar (dev uniquement)

; Pilote réseau (nécessaire pour l'Online Subsystem).

[/Script/Engine.GameEngine]
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="OnlineSubsystemUtils.IpNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")

; Rendu réaliste (Lumen / Nanite sont généralement activés par défaut en UE5).

